<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#15221f"/>
      <stop offset="70%" stop-color="#0a1311"/>
      <stop offset="100%" stop-color="#04080a"/>
    </radialGradient>
    <!-- Vial glass: top-light falloff + sage tint -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a7bfb0"/>
      <stop offset="50%" stop-color="#6f8b7c"/>
      <stop offset="100%" stop-color="#526c5f"/>
    </linearGradient>
    <linearGradient id="glassHilite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4d98a"/>
      <stop offset="45%" stop-color="#d3a44d"/>
      <stop offset="100%" stop-color="#8e6a27"/>
    </linearGradient>
    <linearGradient id="label" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4ecd9"/>
      <stop offset="100%" stop-color="#e3d9c0"/>
    </linearGradient>
    <linearGradient id="powder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#efe5cf"/>
      <stop offset="100%" stop-color="#c9bd9f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="14" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Brand corner — hexagon + wordmark -->
  <g transform="translate(72, 88)">
    <g transform="translate(0, 0)">
      <!-- Hexagon outline + dot -->
      <polygon points="28,0 54,15 54,45 28,60 2,45 2,15" fill="none" stroke="#b8c7be" stroke-width="2.2"/>
      <circle cx="28" cy="30" r="5.5" fill="#b8c7be"/>
    </g>
    <text x="76" y="42" font-size="30" fill="#e8eae7" letter-spacing="2" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="500">
      NAVIGATE <tspan fill="#8fa695">|</tspan> PEPTIDES
    </text>
  </g>

  <!-- Kicker line, top-left above headline -->
  <g transform="translate(72, 210)">
    <line x1="0" y1="10" x2="46" y2="10" stroke="#8fa695" stroke-width="2"/>
    <text x="60" y="16" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="16" letter-spacing="4" fill="#8fa695" font-weight="500">
      PRECISION PEPTIDE RESEARCH
    </text>
  </g>

  <!-- Display headline -->
  <text x="72" y="308" font-size="82" fill="#ece9df" font-weight="400" letter-spacing="-1">Engineered.</text>
  <text x="72" y="392" font-size="82" fill="#8fa695" font-style="italic" font-weight="400" letter-spacing="-1">Intelligent.</text>

  <!-- Sub-copy -->
  <text x="72" y="452" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#b8c7be" font-weight="400">
    Research-grade compounds for controlled
  </text>
  <text x="72" y="482" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#b8c7be" font-weight="400">
    laboratory investigation.
  </text>

  <!-- Credential strip -->
  <g transform="translate(72, 538)" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="14" letter-spacing="2" fill="#8fa695" font-weight="500">
    <text x="0"   y="0">THIRD-PARTY TESTED</text>
    <text x="220" y="0" fill="#3a4a43">·</text>
    <text x="240" y="0">COA VERIFIED</text>
    <text x="390" y="0" fill="#3a4a43">·</text>
    <text x="410" y="0">RESEARCH USE ONLY</text>
  </g>

  <!-- =========================================================
       Vial illustration (right side)
       ========================================================= -->
  <g transform="translate(860, 72)" filter="url(#softShadow)">
    <!-- Body silhouette (rounded-bottom flask shape) -->
    <path d="
      M 60,120
      L 60,430
      Q 60,490 120,490
      L 200,490
      Q 260,490 260,430
      L 260,120
      Z
    " fill="url(#glass)" stroke="#3a4a43" stroke-width="1.5"/>

    <!-- Powder inside (bottom ~40%) -->
    <path d="
      M 68,340
      L 68,428
      Q 68,482 120,482
      L 200,482
      Q 252,482 252,428
      L 252,340
      Q 160,326 68,340
      Z
    " fill="url(#powder)" opacity="0.92"/>

    <!-- Glass highlight strip -->
    <path d="M 72,130 L 72,420 Q 72,478 120,478"
          fill="none" stroke="url(#glassHilite)" stroke-width="20" stroke-linecap="round"/>

    <!-- Neck + shoulder shadow to define cap seam -->
    <rect x="60" y="110" width="200" height="18" fill="#2a3933" opacity="0.35"/>

    <!-- Brass crimp cap -->
    <rect x="70" y="36" width="180" height="88" rx="6" ry="6" fill="url(#brass)" stroke="#5a4418" stroke-width="1.5"/>
    <!-- Cap ridges (top edge) -->
    <rect x="70" y="36" width="180" height="10" fill="#3a2e14" opacity="0.25"/>
    <rect x="70" y="52" width="180" height="2"  fill="#ffffff" opacity="0.35"/>
    <rect x="70" y="60" width="180" height="2"  fill="#ffffff" opacity="0.25"/>
    <!-- Cap top rim -->
    <ellipse cx="160" cy="36" rx="90" ry="10" fill="url(#brass)" stroke="#5a4418" stroke-width="1.2"/>

    <!-- Label (cream paper overlay) -->
    <g transform="translate(82, 180)">
      <rect width="156" height="210" fill="url(#label)" stroke="#bda77a" stroke-width="0.8"/>

      <!-- RESEARCH GRADE kicker -->
      <text x="14" y="24" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="9" letter-spacing="2.2" fill="#5a7267" font-weight="600">
        RESEARCH GRADE
      </text>

      <!-- NAVIGATE wordmark -->
      <text x="14" y="54" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="22" letter-spacing="1.5" fill="#2b3530" font-weight="600">
        NAVIGATE
      </text>
      <!-- Peptides italic serif -->
      <text x="14" y="84" font-size="26" font-style="italic" fill="#2b3530">
        Peptides
      </text>

      <!-- Spec rows -->
      <g font-family="'Courier New', Courier, monospace" font-size="8" fill="#4a5550">
        <line x1="14" y1="98" x2="142" y2="98" stroke="#bda77a" stroke-width="0.6"/>
        <text x="14"  y="114">COMPOUND</text><text x="142" y="114" text-anchor="end" fill="#2b3530">GHK-Cu</text>
        <text x="14"  y="128">MW</text>      <text x="142" y="128" text-anchor="end" fill="#2b3530">340.4</text>
        <text x="14"  y="142">PURITY</text>  <text x="142" y="142" text-anchor="end" fill="#2b3530">≥99%</text>
        <text x="14"  y="156">FORM</text>    <text x="142" y="156" text-anchor="end" fill="#2b3530">Lyophilized</text>
        <text x="14"  y="170">BATCH</text>   <text x="142" y="170" text-anchor="end" fill="#2b3530">Q247A</text>
        <line x1="14" y1="178" x2="142" y2="178" stroke="#bda77a" stroke-width="0.6"/>
      </g>

      <!-- RUO chip -->
      <rect x="14" y="186" width="30" height="14" fill="#7a2422"/>
      <text x="29" y="196" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#f4ecd9" letter-spacing="1" font-weight="600">RUO</text>
      <text x="52" y="196" font-family="'Courier New', Courier, monospace" font-size="8" fill="#4a5550">Not for human use</text>
    </g>
  </g>

  <!-- Footer URL -->
  <text x="600" y="608" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="3" fill="#4a5b53" font-weight="500">
    NAVIGATEPEPTIDES.COM
  </text>
</svg>
