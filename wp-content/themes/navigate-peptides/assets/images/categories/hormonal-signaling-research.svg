  <circle cx="200" cy="200" r="80" stroke="#6B5A7A" stroke-width="2"/>
  <circle cx="200" cy="200" r="48" stroke="#6B5A7A" stroke-width="1.5" opacity="0.7"/>
  <circle cx="200" cy="200" r="14" fill="#6B5A7A" opacity="0.45"/>
  <!-- Pulse / signal trace through the receptor -->
  <path d="M40 200 L100 200 L120 160 L150 240 L180 200 L200 200 L220 200 L250 160 L280 240 L300 200 L360 200"
